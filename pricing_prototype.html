<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPARC · Premium Triage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="pricing_data_inline.js"></script>
<style>
:root {
  --red: #AD1E23; --red-dark: #8A1519; --red-tint: rgba(173,30,35,.07);
  --red-border: rgba(173,30,35,.18);
  --ink: #0F172A; --ink-2: #1E293B; --ink-muted: #64748B;
  --ink-faint: #94A3B8; --ink-ghost: #CBD5E1;
  --bg: #FAFAF8; --surface: #F1F1EE; --surface-2: #E8E8E4;
  --border: #E2E2DC; --white: #FFFFFF;
  --green: #059669; --green-tint: rgba(5,150,105,.07); --green-light: #D1FAE5;
  --amber: #B45309; --amber-light: #FEF3C7;
  --shadow-card: 0 1px 1px rgba(15,23,42,.03), 0 4px 16px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.85);
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.04);
  --font-head: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* ── HEADER ─────────────────────────────────────────────── */
.app-header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 13px 28px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
}
.app-logo { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--red); letter-spacing: -.01em; flex-shrink: 0; }
.header-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
.entity-name { font-family: var(--font-head); font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; }
.header-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: .01em; line-height: 1.6; }
.badge-lob { background: var(--red); color: white; }
.badge-neutral { background: var(--surface); color: var(--ink-muted); border: 1px solid var(--border); }
.badge-warn { background: var(--amber-light); color: var(--amber); }
.badge-ok { background: var(--green-light); color: var(--green); }
.header-spacer { flex: 1; }
.header-date { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); flex-shrink: 0; }

/* ── LAYOUT ─────────────────────────────────────────────── */
.main-layout {
  display: grid; grid-template-columns: 1fr 320px;
  gap: 20px; max-width: 1180px; margin: 0 auto; padding: 22px 24px; align-items: start;
}
.formula-chain { display: flex; flex-direction: column; gap: 6px; }
.section-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  color: var(--ink-faint); padding: 10px 0 6px;
  display: flex; align-items: center; gap: 8px;
}
.section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── FACTOR TABLE ────────────────────────────────────────── */
.factor-table { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-card); }
.factor-row { display: grid; grid-template-columns: 26px 1fr 108px 80px 28px; align-items: center; border-bottom: 1px solid var(--surface-2); transition: background .12s; }
.factor-row:last-child { border-bottom: none; }
.factor-row:hover { background: var(--surface); }
.factor-row.sub { background: var(--surface); border-top: 1px solid var(--border); }
.f-op { font-family: var(--font-mono); font-size: 12px; color: var(--ink-ghost); text-align: center; padding: 9px 0 9px 8px; user-select: none; }
.f-label { font-size: 12.5px; color: var(--ink-2); padding: 9px 10px; line-height: 1.4; }
.f-sub { display: block; font-size: 10.5px; color: var(--ink-faint); margin-top: 1px; }
.ph-tag { display: inline-flex; align-items: center; font-size: 9px; font-weight: 700; color: var(--amber); background: var(--amber-light); border-radius: 3px; padding: 0 4px; margin-left: 5px; vertical-align: middle; }
.f-val { font-family: var(--font-mono); font-size: 12.5px; font-weight: 500; color: var(--ink); text-align: right; padding: 9px 10px; white-space: nowrap; }
.f-val.up { color: var(--red); }
.f-val.dn { color: var(--green); }
.f-val.bold { font-weight: 700; font-size: 13px; }
.f-src { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); text-align: center; padding: 9px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.f-src a { color: var(--ink-faint); text-decoration: none; border-bottom: 1px dashed var(--ink-ghost); }
.f-src a:hover { color: var(--red); border-color: var(--red); }
.f-conf { padding: 9px 6px 9px 0; text-align: center; }
.cdot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
.conf-high { background: var(--green); }
.conf-medium { background: var(--amber); }
.conf-low, .conf-PLACEHOLDER { background: var(--ink-ghost); }

/* ── LOADINGS CARD ───────────────────────────────────────── */
.loadings-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-card); }
.loadings-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); }
.loadings-title { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-muted); }
.net-badge { font-family: var(--font-mono); font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.net-badge.neg { color: var(--green); background: var(--green-tint); }
.net-badge.pos { color: var(--red); background: var(--red-tint); }
.net-badge.zero { color: var(--ink-muted); background: var(--surface-2); }
.active-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 2px; min-height: 38px; }
.active-empty { font-size: 12px; color: var(--ink-faint); padding: 8px 4px; text-align: center; }
.lrow { display: grid; grid-template-columns: 1fr 56px 52px 28px; align-items: center; gap: 6px; padding: 6px 6px; border-radius: 6px; transition: background .1s; }
.lrow:hover { background: var(--surface); }
.lrow-name { font-size: 12px; color: var(--ink-2); }
.lrow-pct { font-family: var(--font-mono); font-size: 12px; font-weight: 600; text-align: right; }
.lrow-pct.neg { color: var(--green); }
.lrow-pct.pos { color: var(--red); }
.lrow-src { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); text-align: center; }
.rm-btn { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px; background: var(--white); color: var(--ink-muted); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all .12s; flex-shrink: 0; }
.rm-btn:hover { background: var(--red-tint); border-color: var(--red-border); color: var(--red); }
.clamp-bar { margin: 0 12px 4px; font-size: 11px; color: var(--amber); background: var(--amber-light); border-radius: 5px; padding: 4px 8px; text-align: center; display: none; }
.clamp-bar.on { display: block; }
.add-row { padding: 8px 12px; border-top: 1px solid var(--surface-2); }
.add-btn-main { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: var(--red); background: var(--red-tint); border: 1px solid var(--red-border); border-radius: 5px; padding: 4px 11px; cursor: pointer; transition: all .15s; font-family: var(--font-body); }
.add-btn-main:hover { background: var(--red); color: white; }
.catalog-drawer { border-top: 1px solid var(--surface-2); padding: 10px 12px; display: none; flex-direction: column; gap: 2px; }
.catalog-drawer.open { display: flex; }
.catalog-title { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-faint); padding-bottom: 6px; }
.citem { display: grid; grid-template-columns: 1fr 56px 28px; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 6px; border: 1px solid transparent; transition: all .12s; }
.citem:hover:not(.na) { background: var(--surface); border-color: var(--border); }
.citem.na { opacity: .38; pointer-events: none; }
.citem-name { font-size: 12px; color: var(--ink-2); }
.citem-lobs { display: block; font-size: 10px; color: var(--ink-faint); }
.citem-pct { font-family: var(--font-mono); font-size: 12px; font-weight: 600; text-align: right; }
.citem-pct.neg { color: var(--green); }
.citem-pct.pos { color: var(--red); }
.add-sm { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px; background: var(--white); color: var(--green); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .12s; flex-shrink: 0; font-family: var(--font-body); }
.add-sm:hover { background: var(--green-light); border-color: var(--green); }
.add-sm:disabled { opacity: .3; cursor: not-allowed; }

/* ── PREMIUM PANEL ───────────────────────────────────────── */
.premium-panel { position: sticky; top: 66px; display: flex; flex-direction: column; gap: 10px; }
.pcard { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-card); }
.range-head { background: var(--red); padding: 18px 18px 15px; text-align: center; }
.range-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.6); margin-bottom: 8px; }
.range-row { display: flex; align-items: baseline; justify-content: center; gap: 8px; }
.range-amt { font-family: var(--font-head); font-size: 24px; font-weight: 700; color: white; letter-spacing: -.02em; }
.range-dash { font-size: 16px; color: rgba(255,255,255,.45); }
.range-mid-line { margin-top: 6px; font-size: 12px; color: rgba(255,255,255,.65); font-family: var(--font-mono); }
.range-mid-line span { font-weight: 500; color: rgba(255,255,255,.9); }
.breakdown { padding: 2px 0; }
.brow { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--surface-2); gap: 8px; }
.brow:last-child { border-bottom: none; }
.brow.tot { padding: 10px 16px; background: var(--surface); }
.blabel { font-size: 12px; color: var(--ink-muted); flex: 1; }
.bval { font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: var(--ink); text-align: right; white-space: nowrap; }
.bval.red { color: var(--red); font-weight: 700; }
.bval.neg { color: var(--green); }
.bval.pos { color: var(--red); }
.kpi-strip { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: var(--surface); border-top: 1px solid var(--border); }
.kpi-l { font-size: 11px; color: var(--ink-faint); }
.kpi-v { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink-2); }
.disclaimer-box { background: var(--amber-light); border: 1px solid rgba(180,83,9,.15); border-radius: 8px; padding: 10px 12px; font-size: 11px; color: var(--amber); line-height: 1.5; }
.sources-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
.src-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-muted); cursor: pointer; user-select: none; transition: background .1s; }
.src-toggle:hover { background: var(--surface); }
.src-body { display: none; padding: 8px 14px 10px; flex-direction: column; gap: 5px; }
.src-body.open { display: flex; }
.sitem { display: grid; grid-template-columns: 34px 1fr; gap: 4px; font-size: 11px; align-items: start; }
.scode { font-family: var(--font-mono); font-weight: 500; color: var(--ink-muted); padding-top: 1px; }
.scite { color: var(--ink-muted); line-height: 1.4; }
.scite a { color: var(--red); text-decoration: none; }
.scite a:hover { text-decoration: underline; }

@media (max-width: 820px) {
  .main-layout { grid-template-columns: 1fr; padding: 14px; }
  .premium-panel { position: static; }
  .factor-row { grid-template-columns: 24px 1fr 90px 60px; }
  .f-conf { display: none; }
  .range-amt { font-size: 20px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">SPARC</div>
  <div class="header-sep"></div>
  <div class="entity-name" id="hdr-entity">—</div>
  <div class="header-badges" id="hdr-badges"></div>
  <div class="header-spacer"></div>
  <div class="header-date" id="hdr-date">—</div>
</header>

<div class="main-layout">
  <div class="formula-chain">

    <div class="section-eyebrow">Rating Factors</div>
    <div class="factor-table" id="rating-table"></div>

    <div class="section-eyebrow">Active Adjustments</div>
    <div class="loadings-card">
      <div class="loadings-head">
        <span class="loadings-title">Loadings &amp; Discounts</span>
        <span class="net-badge zero" id="net-badge">0.0%</span>
      </div>
      <div class="active-list" id="active-list"><div class="active-empty">No adjustments applied</div></div>
      <div class="clamp-bar" id="clamp-bar">Net adjustment clamped to ±25%</div>
      <div class="add-row">
        <button class="add-btn-main" id="catalog-toggle">+ Add adjustment</button>
      </div>
      <div class="catalog-drawer" id="catalog-drawer">
        <div class="catalog-title" id="catalog-title">Available adjustments</div>
        <div id="catalog-items"></div>
      </div>
    </div>

    <div class="section-eyebrow">Expense &amp; Tax</div>
    <div class="factor-table" id="expense-table"></div>

  </div>

  <aside class="premium-panel">
    <div class="pcard">
      <div class="range-head">
        <div class="range-eyebrow">Indicative Range (±30%)</div>
        <div class="range-row">
          <span class="range-amt" id="r-low">—</span>
          <span class="range-dash">—</span>
          <span class="range-amt" id="r-high">—</span>
        </div>
        <div class="range-mid-line">Mid: <span id="r-mid">—</span></div>
      </div>
      <div class="breakdown" id="breakdown"></div>
      <div class="kpi-strip">
        <span class="kpi-l" id="kpi-bps">—</span>
        <span class="kpi-v" id="kpi-dq">DQ —</span>
      </div>
    </div>
    <div class="disclaimer-box" id="disclaimer"></div>
    <div class="sources-card">
      <div class="src-toggle" id="src-toggle">Sources cited <span id="src-arrow">›</span></div>
      <div class="src-body" id="src-body"></div>
    </div>
  </aside>
</div>

<script>
const D = window.PRICING_DATA, Q = D.quote, CAT = D.loadings_catalog, LOB = Q.line_of_business;
const EXP_MULTI = 1 / (1 - 0.18 - 0.125 - 0.04 - 0.08);
const STAMP = Q.stamp_duty_inr, BAND = 0.30, CLAMP = 0.25;
let active = new Set(Q.active_loadings.map(x => x.id));

function fmtL(n) {
  if (n >= 1e7) return '₹' + (n/1e7).toFixed(2) + ' Cr';
  if (n >= 1e5) return '₹' + (n/1e5).toFixed(2) + ' L';
  return '₹' + Math.round(n).toLocaleString('en-IN');
}
function fmtE(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }
function fmtP(v) { return (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%'; }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function calc() {
  const tech = Q.technical_premium_inr;
  let net = 0;
  active.forEach(id => { if (CAT[id]) net += CAT[id].value; });
  const clamped = Math.abs(net) > CLAMP;
  if (net > CLAMP) net = CLAMP;
  if (net < -CLAMP) net = -CLAMP;
  const loaded = tech * (1 + net);
  const gross = loaded * EXP_MULTI;
  const gstAmt = gross * 0.18;
  const mid = gross + gstAmt + STAMP;
  return { tech, net, loaded, gross, gstAmt, mid, low: mid*(1-BAND), high: mid*(1+BAND), clamped };
}

function labelOf(step) {
  return step.replace(/^\d+[a-z]?\.\s+[×÷+]?\s*/i, '').trim();
}

function renderHeader() {
  const e = Q.inputs_echo;
  const entity = e.cin ? e.cin.replace(/^[UL]\d{5}[A-Z]{2}\d{4}/, 'KA2022') : 'Demo Entity';
  document.getElementById('hdr-entity').textContent = entity + ' · ' + e.state;
  const ph = Q.placeholders_used.length, dq = Q.data_quality_score;
  document.getElementById('hdr-badges').innerHTML =
    `<span class="badge badge-lob">${esc(LOB)}</span>
     <span class="badge badge-neutral">NIC ${esc(e.nic_code)}</span>
     <span class="badge badge-neutral">${esc(e.stage)}</span>
     <span class="badge badge-neutral">₹${(e.sum_insured_inr/1e7).toFixed(0)} Cr SI</span>
     ${ph > 0
       ? `<span class="badge badge-warn">⚠ ${ph} placeholder${ph>1?'s':''}</span>`
       : `<span class="badge badge-ok">DQ ${dq.toFixed(1)}</span>`}`;
  document.getElementById('hdr-date').textContent = new Date().toISOString().slice(0,10);
}

function renderRatingTable() {
  const rows = Q.factor_trace.filter(s => parseInt(s.step) <= 4);
  let h = '';
  for (const r of rows) {
    const isPH = r.is_placeholder;
    const conf = isPH ? 'PLACEHOLDER' : (r.confidence || 'medium');
    const n = parseInt(r.step);
    const op = n === 1 ? '' : n === 2 ? '=' : '×';
    const isSub = n === 2;
    const raw = r.raw_value;
    let vc = '';
    if (n >= 3 && typeof raw === 'number') vc = raw > 1.005 ? ' up' : raw < 0.995 ? ' dn' : '';
    const srcHTML = r.source_citation && r.source_citation !== '—'
      ? (r.source_url ? `<a href="${esc(r.source_url)}" target="_blank">${esc(r.source_citation)}</a>` : esc(r.source_citation))
      : '—';
    h += `<div class="factor-row${isSub ? ' sub' : ''}">
      <div class="f-op">${op}</div>
      <div class="f-label">${esc(labelOf(r.step))}${isPH ? '<span class="ph-tag">PH</span>' : ''}
        ${r.notes ? `<span class="f-sub">${esc(r.notes.slice(0,72))}</span>` : ''}</div>
      <div class="f-val${vc}${isSub ? ' bold' : ''}">${esc(r.value)}</div>
      <div class="f-src">${srcHTML}</div>
      <div class="f-conf"><span class="cdot conf-${conf}" title="${conf}"></span></div>
    </div>`;
  }
  h += `<div class="factor-row sub">
    <div class="f-op">=</div>
    <div class="f-label">Technical premium<span class="f-sub">Before adjustments &amp; expense loading</span></div>
    <div class="f-val bold">${fmtE(Q.technical_premium_inr)}</div>
    <div class="f-src">derived</div>
    <div class="f-conf"></div>
  </div>`;
  document.getElementById('rating-table').innerHTML = h;
}

function renderExpenseTable() {
  const rows = Q.factor_trace.filter(s => { const n = parseInt(s.step); return n === 6 || n === 7; });
  let h = '';
  for (const r of rows) {
    const op = parseInt(r.step) === 6 ? '÷' : '+';
    const srcHTML = r.source_citation && r.source_citation !== '—'
      ? (r.source_url ? `<a href="${esc(r.source_url)}" target="_blank">${esc(r.source_citation)}</a>` : esc(r.source_citation))
      : '—';
    h += `<div class="factor-row">
      <div class="f-op">${op}</div>
      <div class="f-label">${esc(labelOf(r.step))}</div>
      <div class="f-val">${esc(r.value)}</div>
      <div class="f-src">${srcHTML}</div>
      <div class="f-conf"><span class="cdot conf-${r.confidence || 'medium'}" title="${r.confidence || 'medium'}"></span></div>
    </div>`;
  }
  document.getElementById('expense-table').innerHTML = h;
}

function renderActive() {
  const c = calc();
  const ids = Array.from(active);
  let h = '';
  if (!ids.length) {
    h = '<div class="active-empty">No adjustments applied</div>';
  } else {
    for (const id of ids) {
      const item = CAT[id]; if (!item) continue;
      const v = item.value, neg = v < 0;
      const label = id.replace(/_/g, ' ');
      const srcShort = (item.source.citation || '').split('—')[0].replace(/[^A-Z0-9[\]]/gi,'').slice(0,8) || '—';
      h += `<div class="lrow">
        <span class="lrow-name">${esc(label)}</span>
        <span class="lrow-pct ${neg?'neg':'pos'}">${fmtP(v)}</span>
        <span class="lrow-src">${esc(srcShort)}</span>
        <button class="rm-btn" data-id="${esc(id)}" title="Remove">×</button>
      </div>`;
    }
  }
  document.getElementById('active-list').innerHTML = h;
  const nb = document.getElementById('net-badge');
  nb.textContent = fmtP(c.net);
  nb.className = 'net-badge ' + (c.net < -0.001 ? 'neg' : c.net > 0.001 ? 'pos' : 'zero');
  document.getElementById('clamp-bar').classList.toggle('on', c.clamped);
  document.querySelectorAll('.rm-btn').forEach(b =>
    b.addEventListener('click', () => { active.delete(b.dataset.id); renderAll(); }));
}

function renderCatalog() {
  let h = '', any = false;
  for (const [id, item] of Object.entries(CAT)) {
    if (active.has(id)) continue;
    any = true;
    const ok = item.applies_to.includes(LOB);
    const v = item.value, neg = v < 0;
    const label = id.replace(/_/g, ' ');
    h += `<div class="citem${ok ? '' : ' na'}">
      <div class="citem-name">${esc(label)}<span class="citem-lobs">${esc(item.applies_to.join(', '))}${!ok ? ' · N/A for '+esc(LOB) : ''}</span></div>
      <span class="citem-pct ${neg?'neg':'pos'}">${fmtP(v)}</span>
      <button class="add-sm" data-id="${esc(id)}" ${ok ? '' : 'disabled'}>+</button>
    </div>`;
  }
  if (!any) h = '<div style="font-size:12px;color:var(--ink-faint);padding:6px 0">All adjustments applied</div>';
  document.getElementById('catalog-items').innerHTML = h;
  document.getElementById('catalog-title').textContent = `Available adjustments for ${LOB}`;
  document.querySelectorAll('.add-sm:not([disabled])').forEach(b =>
    b.addEventListener('click', () => { active.add(b.dataset.id); renderAll(); }));
}

function renderPremium() {
  const c = calc();
  document.getElementById('r-low').textContent = fmtL(c.low);
  document.getElementById('r-high').textContent = fmtL(c.high);
  document.getElementById('r-mid').textContent = fmtE(c.mid);
  const adj = c.loaded - c.tech;
  const expPct = ((1 - 1/EXP_MULTI)*100).toFixed(1);
  const rows = [
    { l: 'Technical premium', v: fmtE(c.tech) },
    { l: `Net adjustment  ${fmtP(c.net)}`, v: (adj >= 0 ? '+' : '') + fmtE(adj), cls: adj < 0 ? 'neg' : adj > 0 ? 'pos' : '' },
    { l: 'Loaded premium', v: fmtE(c.loaded), bold: true },
    { l: `÷ (1 − ${expPct}% expenses)`, v: `× ${EXP_MULTI.toFixed(3)}` },
    { l: 'Gross premium', v: fmtE(c.gross), bold: true },
    { l: '+ GST @ 18%', v: '+' + fmtE(c.gstAmt) },
    { l: `+ Stamp duty (${Q.inputs_echo.state})`, v: '+₹' + STAMP.toLocaleString('en-IN') },
  ];
  let h = rows.map(r =>
    `<div class="brow${r.bold ? ' tot' : ''}">
      <span class="blabel">${esc(r.l)}</span>
      <span class="bval ${r.cls || ''}">${esc(r.v)}</span>
    </div>`).join('');
  h += `<div class="brow tot">
    <span class="blabel" style="color:var(--ink);font-weight:600">Mid-point incl. GST</span>
    <span class="bval red">${fmtE(c.mid)}</span>
  </div>`;
  document.getElementById('breakdown').innerHTML = h;
  const bps = ((c.mid / Q.inputs_echo.revenue_current_inr) * 10000).toFixed(1);
  document.getElementById('kpi-bps').textContent = bps + ' bps of current revenue';
  document.getElementById('kpi-dq').textContent = 'DQ ' + Q.data_quality_score.toFixed(1);
}

function renderSources() {
  let h = '';
  for (const s of Q.sources_cited) {
    h += `<div class="sitem">
      <span class="scode">${esc(s.code)}</span>
      <span class="scite">${s.url ? `<a href="${esc(s.url)}" target="_blank">${esc(s.citation)}</a>` : esc(s.citation)}</span>
    </div>`;
  }
  document.getElementById('src-body').innerHTML = h;
  document.getElementById('src-toggle').addEventListener('click', () => {
    const open = document.getElementById('src-body').classList.toggle('open');
    document.getElementById('src-arrow').textContent = open ? '⋁' : '›';
  });
}

function renderAll() { renderActive(); renderCatalog(); renderPremium(); }

document.getElementById('catalog-toggle').addEventListener('click', () => {
  const open = document.getElementById('catalog-drawer').classList.toggle('open');
  document.getElementById('catalog-toggle').textContent = open ? '− Hide catalog' : '+ Add adjustment';
});

document.getElementById('disclaimer').textContent = Q.disclaimer;
renderHeader(); renderRatingTable(); renderExpenseTable(); renderAll(); renderSources();
</script>
</body>
</html>
