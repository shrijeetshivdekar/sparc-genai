<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPARC | Startup Shield</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell">
      <section class="panel">
        <div class="brand-row">
          <div class="brand-mark">S</div>
          <div>
            <div class="eyebrow">SPARC | ICICI Lombard</div>
            <h1>Startup risk intake</h1>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="section-label">Identity</span>
            <span id="step-label">1 of 15</span>
          </div>
          <div class="progress-track"><div id="progress-fill"></div></div>
        </div>

        <div id="screen" class="screen"></div>

        <div class="nav-row">
          <button id="back-btn" class="btn btn-ghost" type="button">Back</button>
          <button id="next-btn" class="btn btn-primary" type="button">Next</button>
        </div>
      </section>

      <aside class="summary" id="summary">
        <div class="summary-title">Current profile</div>
        <div id="summary-body"></div>
      </aside>
    </main>

    <template id="results-template">
      <section class="results">
        <div class="results-hero">
          <div class="eyebrow">Recommendation output</div>
          <h1 id="result-title"></h1>
          <p id="result-subtitle"></p>
        </div>
        <div class="result-grid">
          <div class="result-card">
            <div class="card-label">Overall risk</div>
            <div class="overall-score" id="overall-score"></div>
            <div id="cluster-bars"></div>
          </div>
          <div class="result-card">
            <div class="card-label">Top risk drivers</div>
            <div id="top-risks"></div>
          </div>
        </div>
        <div class="result-card">
          <div class="card-label">Recommended ICICI Lombard products</div>
          <div id="recommendations"></div>
        </div>
        <button id="edit-btn" class="btn btn-ghost" type="button">Edit inputs</button>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
